<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111729" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="给以纯的爱" />
    <title>只给以纯的爱</title>
    <link rel="preload" as="image" href="assets/hero-letter.png" />
    <link rel="stylesheet" href="styles.css?v=20260702-music-cache" />
  </head>
  <body>
    <canvas id="effectCanvas" aria-hidden="true"></canvas>
    <section class="privacy-gate" id="privacyGate" aria-labelledby="gateTitle">
      <div class="gate-glow" aria-hidden="true"></div>
      <form class="gate-panel" id="gateForm">
        <p class="eyebrow">Only For Yichun</p>
        <h1 id="gateTitle">只给你的爱</h1>
        <p class="gate-copy">输入我们之间的暗号，再打开这份只为你准备的浪漫。</p>
        <label class="gate-field" for="gateCode">
          <span>暗号</span>
          <input id="gateCode" type="password" autocomplete="off" inputmode="text" placeholder="输入只属于我们的暗号" />
        </label>
        <p class="gate-error" id="gateError" aria-live="polite"></p>
        <button class="gate-submit" type="submit">打开这份爱</button>
      </form>
    </section>
    <a class="home-return" href="#home" data-view="home" aria-label="回到生日封面">回到封面</a>
    <nav class="top-nav" aria-label="页面导航">
      <a href="#photoWall" data-view="photoWall">相册</a>
      <a href="#letter" data-view="letter">信</a>
      <button class="music-button" id="musicToggle" type="button" aria-label="播放音乐">
        <span id="musicIcon">♪</span>
      </button>
    </nav>

    <main>
      <section class="hero is-active" id="home">
        <img class="hero-image" src="assets/hero-letter.png" alt="" />
        <div class="hero-shade"></div>
        <div class="hero-copy">
          <p class="eyebrow" id="heroKicker"></p>
          <h1 id="heroTitle"></h1>
          <p id="heroText"></p>
          <div class="hero-actions">
            <a class="primary-action" href="#photoWall" data-view="photoWall">回忆</a>
            <button class="secondary-action" id="jumpLetter" type="button">祝福</button>
          </div>
        </div>
      </section>

      <section class="photo-section" id="photoWall">
        <div class="section-shell">
          <header class="section-head">
            <p class="eyebrow">Interactive Album</p>
            <h2>把我们的心动放进同一片星河</h2>
            <p>每一种队形，都是我重新整理过的一次想念；点开任意一张照片，就能看到我写给那一刻的温柔。</p>
          </header>
          <div class="wall-toolbar" aria-label="相册操作">
            <button id="cycleLayout" type="button">换一束星光</button>
            <button id="openFirstPhoto" type="button">从第一眼心动开始</button>
          </div>
          <div class="wall-status" id="wallStatus" aria-live="polite"></div>
          <div class="photo-wall" id="photoGrid" aria-live="polite">
            <div class="stage-lightfields" aria-hidden="true">
              <span class="stage-orbit orbit-a"></span>
              <span class="stage-orbit orbit-b"></span>
              <span class="stage-beam beam-a"></span>
              <span class="stage-beam beam-b"></span>
              <span class="stage-trail trail-a"></span>
              <span class="stage-trail trail-b"></span>
              <span class="stage-flow flow-a"></span>
              <span class="stage-flow flow-b"></span>
              <span class="stage-veil veil-a"></span>
              <span class="stage-veil veil-b"></span>
              <span class="stage-aperture"></span>
            </div>
            <div class="stage-brand">
              <strong id="stageInitials"></strong>
              <span>For Yichun, Always</span>
            </div>
            <div class="stage-mode" id="stageMode"></div>
            <div class="stage-poem">
              <span id="stagePoemLine1"></span>
              <strong id="stagePoemLine2"></strong>
            </div>
            <div class="photo-depth-rail" id="photoDepthRail" aria-hidden="true"></div>
            <div class="photo-cards" id="photoCards"></div>
          </div>
        </div>
      </section>

      <section class="letter-section" id="letter">
        <div class="letter-stage">
          <div class="envelope-wrap" id="envelopeWrap">
            <button class="envelope" id="openLetter" type="button" aria-label="拆开这封信">
              <span class="envelope-flap"></span>
              <span class="envelope-paper">
                <span id="envelopeText"></span>
              </span>
              <span class="envelope-front"></span>
              <span class="seal">♡</span>
            </button>
          </div>

          <article class="letter-paper">
            <p class="eyebrow">Letter</p>
            <h2 id="letterTitle"></h2>
            <div class="letter-body" id="letterBody"></div>
            <div class="letter-actions">
              <button class="primary-action" id="replayLetter" type="button">再把爱读一遍</button>
              <button class="secondary-action letter-overview-toggle" id="openLetterOverview" type="button">全览截图</button>
            </div>
          </article>
        </div>
      </section>
    </main>

    <div class="lightbox" id="photoLightbox" hidden>
      <button class="lightbox-close" id="closeLightbox" type="button" aria-label="关闭照片">×</button>
      <button class="lightbox-nav prev" id="prevPhoto" type="button" aria-label="上一张">‹</button>
      <figure class="lightbox-card">
        <div class="lightbox-image-wrap">
          <img id="lightboxImage" alt="" />
        </div>
        <figcaption>
          <span id="photoCounter"></span>
          <h3 id="lightboxTitle"></h3>
          <p id="lightboxCaption"></p>
          <div class="lightbox-actions">
            <button class="lightbox-full" id="viewFullPhoto" type="button">看见完整的你</button>
            <button class="lightbox-focus" id="focusPhotoStage" type="button">放到星河中央</button>
          </div>
        </figcaption>
      </figure>
      <button class="lightbox-nav next" id="nextPhoto" type="button" aria-label="下一张">›</button>
    </div>

    <div class="letter-overview" id="letterOverview" hidden>
      <section class="letter-overview-sheet" role="dialog" aria-modal="true" aria-label="全览整篇生日信">
        <header class="letter-overview-head">
          <span>Letter Overview</span>
          <strong>写给以纯的生日情书</strong>
        </header>
        <div class="letter-overview-body" id="letterOverviewBody"></div>
      </section>
    </div>

    <script src="app.js?v=20260702-music-cache"></script>
  </body>
</html>
